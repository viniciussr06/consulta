<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta de Consumo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}

.container{
    width:100%;
    max-width:450px;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.cabecalho{
    text-align:center;
    margin-bottom:25px;
}

.logo{
    display:block;
    width:100%;
    max-width:220px;
    height:auto;
    margin:0 auto 15px auto;
    object-fit:contain;
}

h2{
    color:#333;
    font-size:24px;
}

.campo{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#555;
    font-size:14px;
}

input{
    width:100%;
    height:50px;
    padding:0 16px;
    padding-right:45px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    background:white;
}

input:focus{
    outline:none;
    border-color:#007bff;
    box-shadow:0 0 6px rgba(0,123,255,0.3);
}

.resultado{
    background:#f8f8f8;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    color:#007bff;
}

button{
    width:100%;
    height:52px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#005ec4;
}

button:active{
    transform:scale(0.98);
}

@media(max-width:480px){

body{
    padding:10px;
}

.container{
    padding:18px;
}

.logo{
    max-width:180px;
}

h2{
    font-size:20px;
}

input{
    height:48px;
}

button{
    height:48px;
    font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

    <div class="cabecalho">

        <img
        src="LOGO_400px.png"
        class="logo"
        alt="Know How Automação">

        <h2>Consulta de Consumo</h2>

    </div>

    <div class="campo">
        <label>Data Inicial</label>
        <input type="date" id="dataInicial">
    </div>

    <div class="campo">
        <label>Hora Inicial</label>
        <input type="time" id="horaInicial">
    </div>

    <div class="campo">
        <label>Data Final</label>
        <input type="date" id="dataFinal">
    </div>

    <div class="campo">
        <label>Hora Final</label>
        <input type="time" id="horaFinal">
    </div>

    <button onclick="consultar()">
        Consultar
    </button>

    <div class="campo" style="margin-top:20px;">

        <label>Consumo Total</label>

        <input
        type="text"
        id="resultado"
        class="resultado"
        readonly
        placeholder="0 m³">

    </div>

</div>

<script>

function consultar(){

    let valor=(Math.random()*1000).toFixed(2);

    document.getElementById("resultado").value=
    valor+" m³";

}

</script>

</body>
</html>
